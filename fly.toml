app = "clinicaltrust-agent-eval-lab-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  DEMO_MODE = "true"
  ALLOWED_ORIGINS = "http://localhost:5173,http://127.0.0.1:5173,https://clinicaltrust-agent-eval-lab.pages.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
